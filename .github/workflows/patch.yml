name: Patch Deployment

on:
  push:
    branches:
      - "patch/*"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Check out code # Fetches the latest code from the repository.
        uses: actions/checkout@v4

      - name: Setup # Executes setup scripts for dependencies.
        uses: ./.github/actions/setup

      - name: Run CI Action
        uses: ./.github/actions/ci

  # deploy-web:
  #   name: Deploy Web (Patch)
  #   needs: ci
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Check out code # Fetches the latest code from the repository.
  #       uses: actions/checkout@v4

  #     - name: Setup # Executes setup scripts for dependencies.
  #       uses: ./.github/actions/setup

  #     - name: Deploy Hotfix to Production
  #       run: echo "Deploy in environment production"

  publish-packages:
    name: Publish Packages (Patch)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out code # Fetches the latest code from the repository.
        uses: actions/checkout@v4

      - name: Setup # Executes setup scripts for dependencies.
        uses: ./.github/actions/setup

      - name: Publish Hotfix to Production
        run: |
          set -euo pipefail

          # Save repo root for navigation
          repo_root="$(pwd)"

          # Find all package.json files, excluding node_modules
          mapfile -t package_files < <(find . -path "./node_modules" -prune -o -name "package.json" -print)

          for pkg_path in "${package_files[@]}"; do
            pkg_dir="$(dirname "$pkg_path")"
            cd "$pkg_dir" || continue

            echo "📦 Processing $pkg_path"

            # Get package name for git-cliff tag pattern
            pkg_name=$(jq -r '.name' package.json)

            # Check if any tags exist for this package
            if git tag --list "${pkg_name}@*" | head -1 | grep -q .; then
              # Tags exist, use tag pattern
              bump_output=$(git-cliff --tag-pattern "${pkg_name}@*" --bump -o CHANGELOG.md 2>&1)
              raw_version=$(git-cliff --tag-pattern "${pkg_name}@*" --bumped-version | tr -d '\r\n')
            else
              # First run, no tags yet, run without tag pattern
              bump_output=$(git-cliff --bump -o CHANGELOG.md 2>&1)
              raw_version=$(git-cliff --bumped-version | tr -d '\r\n')
            fi
            echo "$bump_output"

            version="${raw_version##*@}"

            # Only proceed if version actually changed
            current_version=$(jq -r '.version' package.json)
            if [ -n "$version" ] && [ "$version" != "$current_version" ]; then
              echo "⬆️  Bump detected for $pkg_name: $current_version -> $version"

              # Split into major.minor.patch
              IFS='.' read -r major minor patch <<< "$current_version"

              # Increment patch only
              new_patch=$((patch + 1))
              patch_version="${major}.${minor}.${new_patch}"

              echo "⬆️  Manual patch bump for $pkg_name: $current_version -> $patch_version"

              # Update package.json version safely
              tmpfile="$(mktemp)"
              jq ".version = \"$patch_version\"" package.json > "$tmpfile" && mv "$tmpfile" package.json

              # Publish if not private
              is_private=$(jq -r '.private // false' package.json)
              if [ "$is_private" != "true" ]; then
                echo "📤 Publishing $pkg_name@$patch_version"
                pnpm publish --access public --tag latest --no-git-checks
              else
                echo "🚫 Skipping private package $pkg_name"
              fi

            else
              echo "ℹ️  No version bump for $pkg_path (current: $current_version, detected: $version)"
            fi

            # Return to repo root
            cd "$repo_root"
          done
